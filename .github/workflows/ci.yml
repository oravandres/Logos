name: ci

env:
  STATICCHECK_VERSION: v0.7.0
  GOVULNCHECK_VERSION: v1.1.4
  GOLANGCI_LINT_VERSION: v1.64.8

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}
          go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}

      - name: Verify modules
        run: |
          go mod tidy
          git diff --exit-code

      - name: Run tests
        run: go test -count=1 ./...

      - name: Run race tests
        run: go test -race -count=1 ./...

      - name: Run vet
        run: go vet ./...

      - name: Run golangci-lint
        run: golangci-lint run --timeout=10m

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Build
        run: go build ./...

      - name: Build service binary
        if: github.ref == 'refs/heads/main'
        id: build_service
        run: |
          if go list ./cmd/service >/dev/null 2>&1; then
            mkdir -p dist
            go build -o dist/service ./cmd/service
            echo "built=true" >> "$GITHUB_OUTPUT"
          else
            echo "cmd/service not present yet; skipping binary artifact build"
            echo "built=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && steps.build_service.outputs.built == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: service-binary
          path: dist/service

      - name: Attest build provenance
        if: github.ref == 'refs/heads/main' && steps.build_service.outputs.built == 'true'
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/service
